version: '3.8'

services:
  workspace-java-eureka:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_programacion_eureka
    ports:
      - "8761:8761"
    networks:
      - red_interna_eureka
    command: tail -f /dev/null
    volumes:
      - .:/app
    working_dir: /app

networks:
  red_interna_eureka: